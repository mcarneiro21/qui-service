apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiservice
  labels:
    app: quiservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiservice
  template:
    metadata:
      labels:
        app: quiservice
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: quiservice
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # String de conexão gerada pelo CloudNativePG (Secret <cluster>-app).
            # Nenhuma credencial fica versionada no Git.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quiservice-db-app
                  key: uri
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: quiservice
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
  selector:
    app: quiservice